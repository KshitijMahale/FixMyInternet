<!doctype html>
<html>
  <head>
    <title>FixMyInternet</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded shadow">
      <h1 class="text-3xl font-bold text-center mb-6">FixMyInternet</h1>

      <div class="text-center mb-6">
        <button
          id="analyzeBtn"
          class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700"
        >
          Analyze My Internet
        </button>
        <p
          id="loading"
          class="hidden text-center mt-4 text-gray-600 font-medium"
        >
          Preparing diagnostics...
        </p>
      </div>

      <div id="results" class="hidden">
        <div class="text-center mb-6">
          <h2 class="text-xl font-semibold mb-4">Internet Health Score</h2>

          <div class="relative w-40 h-40 mx-auto">
            <svg class="transform -rotate-90 w-40 h-40">
              <circle
                cx="80"
                cy="80"
                r="70"
                stroke="#e5e7eb"
                stroke-width="12"
                fill="none"
              />

              <circle
                id="scoreCircle"
                cx="80"
                cy="80"
                r="70"
                stroke="#22c55e"
                stroke-width="12"
                fill="none"
                stroke-dasharray="440"
                stroke-dashoffset="440"
                stroke-linecap="round"
              />
            </svg>

            <div class="absolute inset-0 flex items-center justify-center">
              <span id="healthScore" class="text-3xl font-bold"></span>
            </div>
          </div>
        </div>

        <div class="mb-4">
          <h3 class="font-semibold">Diagnosis</h3>
          <span id="diagnosis"></span>
        </div>

        <div class="mb-4">
          <h3 class="font-semibold">Explanation</h3>
          <span id="explanation"></span>
        </div>

        <div class="mb-4">
          <h3 class="font-semibold">Speed</h3>
          Download: <span id="download"></span> Mbps<br />
          Upload: <span id="upload"></span> Mbps
        </div>

        <div class="mb-4">
          <h3 class="font-semibold">Latency</h3>
          <ul id="latencyResults"></ul>
        </div>

        <div class="mb-4">
          <h3 class="font-semibold">DNS Resolution</h3>
          <ul id="dnsResults"></ul>
        </div>

        <div class="mb-4">
          <h3 class="font-semibold">Packet Loss</h3>
          <span id="packetLoss"></span> %
        </div>

        <div class="mb-4">
          <h3 class="font-semibold">Recommendation</h3>
          <span id="recommendation"></span>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
